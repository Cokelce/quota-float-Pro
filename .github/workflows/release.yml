name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target universal-apple-darwin"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install macOS universal targets
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: npm test
      - run: cargo test --manifest-path src-tauri/Cargo.toml
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: Quota Float Pro v__VERSION__
          releaseBody: |
            ## What's new

            - Adds a tray/menu-bar progress mode that can hide the desktop floating card.
            - Shows a compact quota preview card when hovering the tray/menu-bar progress icon.
            - Improves tray progress colors so they follow healthy, warning, and critical quota states.
            - Adds custom expanded-card sizing and tighter compact-card layout.
            - Expands the README with detailed macOS download, first-run, and menu-bar usage steps.

            ![Quota Float Pro theme preview](https://raw.githubusercontent.com/Cokelce/quota-float-Pro/main/docs/images/themes/theme-aurora.png)

            ## Privacy

            Quota Float Pro remains local-first: it reads existing local Codex/API configuration only for quota and balance requests and does not upload prompts, chats, raw quota responses, API keys, cookies, or local credentials.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
